server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text-like assets (incl. the CanvasKit wasm blob).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm application/manifest+json;

    # Flutter + go_router is a single-page app — every unknown path resolves to
    # index.html so deep links (and web refreshes) don't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The entry point and the service worker must never be cached, so a new
    # deploy is picked up immediately; the service worker then refreshes the rest.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Content-addressed build output is safe to cache aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location /canvaskit/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
