server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    # React Router SPA — every unknown path resolves to index.html so deep links
    # (/room/CODE, /dm/ID, /settings, …) and refreshes don't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry point or the FCM service worker, so new deploys and
    # push handling update immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite emits content-hashed files under /assets/ — safe to cache hard.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
